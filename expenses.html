<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerWorth — Expenses</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="app-page">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <span class="logo-mark">✦</span><span class="logo-text">HerWorth</span>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
    <a href="expenses.html" class="nav-item active"><span class="nav-icon">◉</span> Expenses</a>
    <a href="budget.html" class="nav-item"><span class="nav-icon">◎</span> Budget & Goals</a>
    <a href="accounts.html" class="nav-item"><span class="nav-icon">⬡</span> Accounts</a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">◌</span> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="user-avatar" id="userAvatar">J</div><div class="user-info"><span class="user-name" id="userName">Jane</span><span class="user-email" id="userEmail">jane@email.com</span></div></div>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</aside>

<div class="mobile-topbar">
  <div class="logo"><span class="logo-mark">✦</span><span class="logo-text">HerWorth</span></div>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
</div>

<main class="main-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">Expenses ✦</h1>
      <p class="page-sub">Track every dollar you spend</p>
    </div>
    <div class="header-actions">
      <button class="btn-dark-toggle" onclick="toggleDark()">◑</button>
      <button class="btn-primary btn-sm" onclick="openExpenseModal()">+ Add Expense</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="card filter-bar">
    <div class="filter-group">
      <label>Category</label>
      <select id="filterCategory" onchange="renderExpenses()">
        <option value="">All Categories</option>
        <option value="Food">🍽 Food</option>
        <option value="Drinks">🍹 Drinks</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Shopping">🛍 Shopping</option>
        <option value="Furniture">🛋 Furniture</option>
        <option value="Bills">💡 Bills</option>
        <option value="Health">💊 Health</option>
        <option value="Entertainment">🎬 Entertainment</option>
        <option value="Beauty">💄 Beauty</option>
        <option value="Travel">✈️ Travel</option>
        <option value="Other">📦 Other</option>
      </select>
    </div>
    <div class="filter-group">
      <label>From</label>
      <input type="date" id="filterFrom" onchange="renderExpenses()">
    </div>
    <div class="filter-group">
      <label>To</label>
      <input type="date" id="filterTo" onchange="renderExpenses()">
    </div>
    <div class="filter-group">
      <label>Sort</label>
      <select id="filterSort" onchange="renderExpenses()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="highest">Highest amount</option>
        <option value="lowest">Lowest amount</option>
      </select>
    </div>
    <button class="btn-outline btn-sm" onclick="clearFilters()">Clear filters</button>
  </div>

  <!-- EXPENSE LIST -->
  <div class="card">
    <div class="card-header">
      <h3>All Transactions</h3>
      <span class="tx-count" id="txCount">0 transactions</span>
    </div>
    <div class="expense-list" id="expenseList">
      <div class="empty-state">No expenses yet. Click <strong>+ Add Expense</strong> to get started.</div>
    </div>
  </div>
</main>

<!-- ADD/EDIT EXPENSE MODAL -->
<div class="modal-overlay" id="expenseModal" style="display:none;" onclick="closeModalOutside(event,'expenseModal')">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Expense</h2>
      <button class="modal-close" onclick="closeExpenseModal()">✕</button>
    </div>
    <input type="hidden" id="editExpenseId">

    <div class="field-group">
      <label>Amount *</label>
      <div class="input-wrap">
        <span class="input-icon">$</span>
        <input type="number" id="expAmount" placeholder="0.00" min="0.01" step="0.01">
      </div>
      <span class="field-err" id="expAmountErr"></span>
    </div>

    <div class="field-group">
      <label>Category *</label>
      <select id="expCategory" class="select-styled">
        <option value="">Select category…</option>
        <option value="Food">🍽 Food</option>
        <option value="Drinks">🍹 Drinks</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Shopping">🛍 Shopping</option>
        <option value="Furniture">🛋 Furniture</option>
        <option value="Bills">💡 Bills</option>
        <option value="Health">💊 Health</option>
        <option value="Entertainment">🎬 Entertainment</option>
        <option value="Beauty">💄 Beauty</option>
        <option value="Travel">✈️ Travel</option>
        <option value="Other">📦 Other</option>
      </select>
      <span class="field-err" id="expCategoryErr"></span>
    </div>

    <div class="field-group">
      <label>Description</label>
      <input type="text" id="expDesc" placeholder="e.g. Lunch with friends">
    </div>

    <div class="field-group">
      <label>Date *</label>
      <input type="date" id="expDate">
      <span class="field-err" id="expDateErr"></span>
    </div>

    <div class="modal-footer">
      <button class="btn-outline" onclick="closeExpenseModal()">Cancel</button>
      <button class="btn-primary" onclick="saveExpense()">Save Expense</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal" style="display:none;">
  <div class="modal modal-sm">
    <h2>Delete Expense?</h2>
    <p>This action cannot be undone.</p>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="expenses.js"></script>
</body>
</html>
<script type="module">
  import { monitorAuth } from './firebase.js';

  // Redirect to index.html if not logged in
  monitorAuth(null, 'index.html');
</script>
